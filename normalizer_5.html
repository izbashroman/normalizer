<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Normalizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#181818;--surface2:#222;--border:#2a2a2a;--border2:#383838;
  --text:#e8e8e8;--muted:#555;--accent:#c8f060;--accent-dim:rgba(200,240,96,0.08);
  --green:#4ade80;--red:#ff5f5f;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;}
.header{width:100%;max-width:1340px;margin-bottom:36px;}
.header h1{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.header p{font-size:12px;color:var(--muted);font-family:var(--mono);}
.drop-zone{width:100%;max-width:1340px;border:1px dashed var(--border2);border-radius:3px;padding:44px 40px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:24px;background:var(--surface);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-dim);}
.drop-zone .ico{font-size:26px;margin-bottom:14px;opacity:.35;}
.drop-zone p{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:14px;line-height:1.7;}
.drop-zone p strong{color:var(--text);font-weight:400;}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border2);border-radius:2px;cursor:pointer;transition:all .12s;background:transparent;color:var(--text);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.accent{background:var(--accent);color:#0f0f0f;border-color:var(--accent);}
.btn.accent:hover{background:#d4f570;}
.btn.accent.ok{background:var(--green);border-color:var(--green);}
.toolbar{width:100%;max-width:1340px;display:none;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stats{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:18px;}
.stats span{display:flex;align-items:center;gap:6px;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot.g{background:var(--accent);}
.dot.d{background:var(--muted);}
.toolbar-btns{display:flex;gap:8px;}
.table-wrap{flex:1 1 0;min-width:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
thead tr{background:var(--surface2);}
thead th{padding:10px 14px;text-align:left;font-weight:500;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface);}
td{padding:8px 14px;line-height:1.4;}
td.name{color:#aaa;max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.qty{text-align:center;color:var(--muted);width:80px;}
td.model{width:220px;}
.tag{display:inline-block;padding:2px 9px;border-radius:2px;font-size:11px;font-weight:500;}
.tag.found{background:rgba(200,240,96,.13);color:var(--accent);}
.tag.empty{color:var(--muted);}
.status{width:100%;max-width:1340px;padding:11px 16px;border-radius:3px;font-family:var(--mono);font-size:12px;margin-bottom:16px;display:none;}
.status.err{background:rgba(255,95,95,.1);color:var(--red);border:1px solid rgba(255,95,95,.25);}
.two-col{width:100%;max-width:1340px;display:none;gap:16px;align-items:flex-start;}
.two-col.visible{display:flex;}
.summary-panel{width:280px;flex-shrink:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;position:sticky;top:24px;}
.summary-panel .sp-header{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.summary-panel .sp-header span{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sp-body{max-height:calc(100vh - 180px);overflow-y:auto;}
.sp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.sp-row:last-child{border-bottom:none;}
.sp-row:hover{background:var(--surface);}
.sp-model{font-family:var(--mono);font-size:11px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px;}
.sp-qty{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent);flex-shrink:0;}
.sp-total{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface2);border-top:1px solid var(--border);}
.sp-total span{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.sp-total strong{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);}
</style>
</head>
<body>

<div class="header">
  <h1>// Model Normalizer</h1>
  <p>Загрузи .xlsx → получи Название + Кол-во + Модель → скопируй в Excel</p>
</div>

<div class="drop-zone" id="dz">
  <div class="ico">⬆</div>
  <p><strong>Перетащи .xlsx сюда</strong><br>или нажми для выбора файла<br>Данные берутся только с Лист1</p>
  <button class="btn" onclick="document.getElementById('fi').click();event.stopPropagation()">Выбрать файл</button>
  <input type="file" id="fi" accept=".xlsx" style="display:none">
</div>

<div class="status err" id="status"></div>

<div class="toolbar" id="toolbar">
  <div class="stats" id="stats"></div>
  <div class="toolbar-btns">
    <button class="btn accent" id="copy-btn" onclick="copyAll()">⧉ Копировать всё</button>
    <button class="btn" onclick="downloadXlsx()">↓ Скачать xlsx</button>
  </div>
</div>

<div class="two-col" id="two-col">
  <div class="table-wrap" id="tw">
    <table>
      <thead>
        <tr>
          <th>Название</th>
          <th style="text-align:center">Кол-во</th>
          <th>Модель</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
  <div class="summary-panel">
    <div class="sp-header">
      <span>Итого по моделям</span>
      <button class="btn" style="padding:4px 10px;font-size:10px;" id="copy-summary-btn" onclick="copySummary()">&#x29C9; Копировать</button>
    </div>
    <div class="sp-body" id="sp-body"></div>
    <div class="sp-total">
      <span>Всего</span>
      <strong id="sp-grand-total">0</strong>
    </div>
  </div>
</div>

<script>
const RULES = [
  // iPhones — от специфичного к общему
  ["iPhone 17 Pro Max", ["iphone 17 pro max"]],
  ["iPhone 17 Pro",     ["iphone 17 pro "]],
  ["iPhone 16 Pro Max", ["iphone 16 pro max"]],
  ["iPhone 16 Pro",     ["iphone 16 pro "]],
  ["iPhone 16e",        ["iphone 16e"]],
  ["iPhone 16 Plus",    ["iphone 16 plus"]],
  ["iPhone 16",         ["iphone 16 "], null, ["iphone 16 pro","iphone 16 plus","iphone 16e"]],
  ["iPhone 15 Pro Max", ["iphone 15 pro max"]],
  ["iPhone 15 Pro",     ["iphone 15 pro "]],
  ["iPhone 15 Plus",    ["iphone 15 plus"]],
  ["iPhone 15",         ["iphone 15 "], null, ["iphone 15 pro","iphone 15 plus"]],
  ["iPhone 14 Pro Max", ["iphone 14 pro max"]],
  ["iPhone 14 Pro",     ["iphone 14 pro "]],
  ["iPhone 14 Plus",    ["iphone 14 plus"]],
  ["iPhone 14",         ["iphone 14 "], null, ["iphone 14 pro","iphone 14 plus"]],
  ["iPhone 13 Pro Max", ["iphone 13 pro max"]],
  ["iPhone 13 Pro",     ["iphone 13 pro "]],
  ["iPhone 13",         ["iphone 13 "], null, ["iphone 13 pro"]],
  // iPads
  ["iPad Mini 7",       ["ipad mini 7","ipad mini7"]],
  ["iPad 11 gen",       ["ipad 11 gen","ipad (11"]],
  ["iPad Air 11 M3",    ["ipad air 11 m3"]],
  ["iPad Air 13 M3",    ["ipad air 13 m3"]],
  ["iPad Pro 11 M5",    ['ipad p 11" m5',"ipad p 11 m5"]],
  ["iPad Pro 13 M5",    ['ipad p 13" m5',"ipad p 13 m5"]],
  ["iPad Pro 11 M4",    ['ipad p 11" m4',"ipad p 11 m4"]],
  ["iPad Pro 13 M4",    ['ipad p 13" m4',"ipad p 13 m4"]],
  // MacBooks
  ["MacBook Air 13 M4", ['mba 13" m4',"mba 13 m4"]],
  ["MacBook Air 15 M4", ['mba 15" m4',"mba 15 m4"]],
  ["MacBook Air 13 M3", ['mba 13" m3',"mba 13 m3"]],
  ["MacBook Air 15 M3", ['mba 15" m3',"mba 15 m3"]],
  ["MacBook Air 13 M5", ['mba 13" m5',"mba 13 m5"]],
  ["MacBook Air 15 M5", ['mba 15" m5',"mba 15 m5"]],
  ["MacBook Pro 14 M4", ['mbp 14" m4',"mbp 14 m4"]],
  ["MacBook Pro 16 M4", ['mbp 16" m4',"mbp 16 m4"]],
  ["MacBook Pro 14 M5", ['mbp 14" m5',"mbp 14 m5"]],
  ["MacBook Pro 16 M5", ['mbp 16" m5',"mbp 16 m5"]],
  // Samsung Galaxy — Ultra > Plus > base, FE исключается
  ["Galaxy S23 Ultra",  ["galaxy s23 ultra"], "samsung"],
  ["Galaxy S23 Plus",   ["galaxy s23+","galaxy s23 plus"], "samsung"],
  ["Galaxy S23",        ["galaxy s23 "], "samsung", ["galaxy s23 fe","galaxy s23+","galaxy s23 ultra"]],
  ["Galaxy S24 Ultra",  ["galaxy s24 ultra"], "samsung"],
  ["Galaxy S24 Plus",   ["galaxy s24+","galaxy s24 plus"], "samsung"],
  ["Galaxy S24",        ["galaxy s24 "], "samsung", ["galaxy s24 fe","galaxy s24+","galaxy s24 ultra"]],
  ["Galaxy S25 Ultra",  ["galaxy s25 ultra"], "samsung"],
  ["Galaxy S25 Plus",   ["galaxy s25+","galaxy s25 plus"], "samsung"],
  ["Galaxy S25",        ["galaxy s25 "], "samsung", ["galaxy s25 fe","galaxy s25+","galaxy s25 ultra"]],
  ["Galaxy S26 Ultra",  ["galaxy s26 ultra"], "samsung"],
  ["Galaxy S26 Plus",   ["galaxy s26+","galaxy s26 plus"], "samsung"],
  ["Galaxy S26",        ["galaxy s26 "], "samsung", ["galaxy s26 fe","galaxy s26+","galaxy s26 ultra"]],
  // Apple Watch — только APPLE
  ["Watch Series Ultra 3", ["wa ul3","watch ultra 3"], "apple"],
  ["Watch Series Ultra 2", ["wa ul2","watch ultra 2"], "apple"],
  ["Watch Series SE",      ["watch se"], "apple"],
  ["Watch Series 10",      ["wa s10","watch s10"], "apple"],
  ["Watch Series 11",      ["wa s11","watch s11"], "apple"],
  // Pixels
  ["Pixel 10 Pro XL",  ["pixel 10 pro xl","pixel 10 pro fold"]],
  ["Pixel 10 Pro",     ["pixel 10 pro "]],
  ["Pixel 10",         ["pixel 10 "]],
  ["Pixel 9 Pro XL",   ["pixel 9 pro xl"]],
  ["Pixel 9 Pro",      ["pixel 9 pro "]],
  ["Pixel 9",          ["pixel 9 "]],
  ["Pixel 8 Pro",      ["pixel 8 pro"]],
  ["Pixel 8",          ["pixel 8 "]],
  ["Pixel 7 Pro",      ["pixel 7 pro"]],
  ["Pixel 7",          ["pixel 7 "]],
  // AirPods
  ["AirPods Pro 3",    ["airpods pro 3","airpods pro ac+"]],
  ["AirPods Pro 2",    ["airpods pro 2","airpods pro 2nd","airpods pro gen 2","airpods pro 2 usb","airpods pro gen 2 usb"]],
  ["AirPods Pro",      ["airpods pro"]],
  ["AirPods Max",      ["airpods max"]],
  ["AirPods 4",        ["airpods 4th","airpods 4 "]],
  ["AirPods 3",        ["airpods 3rd","airpods 3 ","airpods 3rd gen magsafe","airpods 3 magsafe"]],
];

// Ключевые слова аксессуаров — такие строки пропускаем
const ACCESSORY_KEYWORDS = [
  "szkło","szklo","tempered","bodyguardz","zagg","invisible shield",
  "screen protector","case","чохол","airtag","pencil","keyboard","magic keyboard",
  "cable","adapter","charger","power adapter","lightning to","usb cable",
  "gopro","beats","nest","mac mini","magic mouse","trackpad","hub","dock",
  "folio","smart folio","smart keyboard","cover","bumper","wallet",
  "airtag","apple tv","homepod","strap","watch band"
];

function isAccessory(name) {
  const n = name.toLowerCase();
  return ACCESSORY_KEYWORDS.some(k => n.includes(k));
}

function normalize(name) {
  if (isAccessory(name)) return "";
  const n = name.toLowerCase() + " ";
  const isApple   = n.startsWith("apple");
  const isSamsung = n.includes("samsung");

  // 1. Попробовать по таблице правил
  for (const rule of RULES) {
    const [model, patterns, brand, excludes] = rule;
    if (brand === "apple"  && !isApple)   continue;
    if (brand === "samsung"&& !isSamsung) continue;
    if (excludes && excludes.some(e => n.includes(e))) continue;
    if (patterns.some(p => n.includes(p))) return model;
  }

  // 2. Fallback — вытащить модель из названия убрав мусор
  return extractModel(name);
}

// Паттерны мусора для удаления (лот-коды, цвета, память, грейды, артикулы)
const NOISE = [
  // Лот-коды и серийники: A-XXXXXX-XX, D-XXXXXX-XX, T-XXXXXX-XX, C5TC0-XXX-XXXX, CST+цифры, TMB+цифры, ATT+цифры, SMS+цифры, SUP+цифры
  /\b[A-Z]\d{6}-\d+\b/g,
  /\bC5TC0-[A-Z0-9]+-[A-Z0-9]+\b/gi,
  /\bCST\d+\b/gi,
  /\bTMB\d+\b/gi,
  /\bATT\d+\b/gi,
  /\bSMS\d+\b/gi,
  /\bSUP\d+\b/gi,
  /\b107276972\b/g,
  // Артикулы в скобках типа (MME73AM/A) (MTJV3LL/A)
  /\([A-Z0-9]{6,}\/[A-Z]\)/gi,
  // Память: 128GB 256GB 512GB 1TB 2TB 16GB 32GB 64GB 24GB 48GB + составные 16GB/512GB
  /\b\d+\s*(gb|tb)\/\d+\s*(gb|tb)\b/gi,
  /\b\d+\s*(gb|tb)\b/gi,
  // Цвета
  /\b(black|white|silver|gold|graphite|starlight|midnight|purple|blue|red|green|yellow|pink|rose|space\s*gray|space\s*black|desert\s*titanium|black\s*titanium|natural\s*titanium|white\s*titanium|deep\s*blue|cosmic\s*orange|sky\s*blue|slate|obsidian|porcelain|moonstone|hazel|coral|sage|teal|ultramarine|jet\s*black|rose\s*gold|pacific\s*blue|sierra\s*blue|alpine\s*green|product\s*red|amber\s*yellow)\b/gi,
  // Грейды: A+ A B+ B C D LN Like New NEW C- A +
  /\b(like\s*new|ln)\b/gi,
  /\s+(new|a\+|a|b\+|b|c\+|c-|c|d)\s*$/gi,
  /\s+(new|a\+|a|b\+|b|c\+|c-|c|d)\s*\b/gi,
  // Буквы-кириллица C/В/А в конце (грейды на русском)
  /[\s,]+[АВСС]\s*$/g,
  // Размеры часов: 42MM 44MM 46MM 49MM и аббревиатуры ремешков/корпусов
  /\b\d{2}mm\b/gi,
  /\b(apl wa|wa )\b/gi,
  /\b(m|s|l|xl)\s+(cl|cl\b)/gi,
  /\b(sport\s*loop|sport\s*band|solo\s*loop|braided|milanese|link|stainless|aluminum|titanium|ceramic)\b/gi,
  // Цветовые аббревиатуры в конце или отдельным словом
  /\b(sil|sg|blk|sbl|mid|nt|btl|rg|clt|clr|crm|wht|gld|spgr|spc|spc gr|spc blk)\b/gi,
  // Слеш в конце после очистки памяти
  /\/\s*\b(sil|sg|blk|mid|nt|sbl)\b/gi,
  /\/$/g,
];

const BRAND_PREFIXES = /^(apple|samsung|google)\s+/i;

function extractModel(raw) {
  let s = raw.trim();

  // Убрать префикс бренда
  s = s.replace(BRAND_PREFIXES, "");

  // Убрать мусор последовательно
  for (const rx of NOISE) s = s.replace(rx, " ");

  // Убрать висящие знаки и пробелы
  s = s.replace(/[,\-]+$/, "").replace(/\s{2,}/g, " ").trim();

  // Убрать хвост начиная с лот-кода если остался (последовательность заглавных+цифр длиной 6+)
  s = s.replace(/\s+[A-Z0-9\-]{6,}.*$/g, "").trim();

  return s || "";
}

let rows = [];

const dz = document.getElementById("dz");
dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("drag-over"); });
dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
dz.addEventListener("drop",      e => { e.preventDefault(); dz.classList.remove("drag-over"); handleFile(e.dataTransfer.files[0]); });
dz.addEventListener("click",     e => { if (e.target.tagName !== "BUTTON") document.getElementById("fi").click(); });
document.getElementById("fi").addEventListener("change", e => handleFile(e.target.files[0]));

function showErr(msg) {
  const el = document.getElementById("status");
  el.textContent = msg; el.style.display = "block";
}

function handleFile(file) {
  if (!file || !file.name.endsWith(".xlsx")) { showErr("Нужен файл .xlsx"); return; }
  document.getElementById("status").style.display = "none";
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: "array" });

      // Берём ТОЛЬКО Лист1 (первый лист или по имени)
      let sheetName = wb.SheetNames[0];
      for (const n of wb.SheetNames) {
        if (n.toLowerCase().includes("лист1") || n.toLowerCase() === "sheet1" || n === "Лист1") {
          sheetName = n; break;
        }
      }
      const data = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, defval: "" });

      rows = [];
      for (const row of data) {
        const name = String(row[0] || "").trim();
        const qty  = row[1];
        if (!name) continue;
        rows.push({ name, qty: qty !== "" ? qty : "", model: normalize(name) });
      }
      if (!rows.length) { showErr("Лист1 пустой или не найден"); return; }
      render();
    } catch(err) { showErr("Ошибка чтения: " + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function render() {
  const matched = rows.filter(r => r.model).length;
  const total   = rows.length;

  document.getElementById("stats").innerHTML =
    `<span><span class="dot g"></span>${matched} распознано</span>` +
    `<span><span class="dot d"></span>${total - matched} без модели</span>` +
    `<span style="color:#444">${total} строк · ${sheetLabel}</span>`;

  const tb = document.getElementById("tb");
  tb.innerHTML = "";
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.innerHTML =
      `<td class="name" title="${esc(r.name)}">${esc(r.name)}</td>` +
      `<td class="qty">${r.qty !== "" ? r.qty : "—"}</td>` +
      `<td class="model">${r.model
        ? `<span class="tag found">${esc(r.model)}</span>`
        : `<span class="tag empty">—</span>`}</td>`;
    tb.appendChild(tr);
  }

  renderSummary();

  document.getElementById("toolbar").style.display = "flex";
  document.getElementById("two-col").classList.add("visible");
  document.getElementById("copy-btn").textContent = "⧉ Копировать всё";
  document.getElementById("copy-btn").classList.remove("ok");
}

function renderSummary() {
  // Группировка по модели, суммируем qty
  const map = new Map();
  let grand = 0;
  for (const r of rows) {
    const key = r.model || "—";
    const q = parseFloat(r.qty) || 0;
    map.set(key, (map.get(key) || 0) + q);
    grand += q;
  }
  // Сортируем по убыванию кол-ва, пустые модели в конец
  const sorted = [...map.entries()].sort((a, b) => {
    if (a[0] === "—") return 1;
    if (b[0] === "—") return -1;
    return b[1] - a[1];
  });

  const sp = document.getElementById("sp-body");
  sp.innerHTML = "";
  for (const [model, qty] of sorted) {
    const div = document.createElement("div");
    div.className = "sp-row";
    div.innerHTML =
      `<span class="sp-model" title="${esc(model)}">${esc(model)}</span>` +
      `<span class="sp-qty">${Math.round(qty * 100) / 100}</span>`;
    sp.appendChild(div);
  }
  document.getElementById("sp-grand-total").textContent = Math.round(grand * 100) / 100;
}

function copySummary() {
  const map = new Map();
  for (const r of rows) {
    const key = r.model || "—";
    const q = parseFloat(r.qty) || 0;
    map.set(key, (map.get(key) || 0) + q);
  }
  const sorted = [...map.entries()].sort((a, b) => {
    if (a[0] === "—") return 1; if (b[0] === "—") return -1; return b[1] - a[1];
  });
  const tsv = sorted.map(([m, q]) => `${m}\t${Math.round(q * 100) / 100}`).join("\n");
  const btn = document.getElementById("copy-summary-btn");
  const copy = t => {
    btn.textContent = "✓ Скопировано"; btn.classList.add("ok");
    setTimeout(() => { btn.textContent = "⧉ Копировать"; btn.classList.remove("ok"); }, 2000);
  };
  navigator.clipboard.writeText(tsv).then(copy).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = tsv; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); copy();
  });
}

let sheetLabel = "Лист1";

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function copyAll() {
  if (!rows.length) return;
  // TSV — вставляется в Excel как таблица (колонки разделены табом)
  const lines = rows.map(r => [r.name, r.qty !== "" ? r.qty : "", r.model].join("\t"));
  const tsv = lines.join("\n");
  navigator.clipboard.writeText(tsv).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ Скопировано";
    btn.classList.add("ok");
    setTimeout(() => { btn.textContent = "⧉ Копировать всё"; btn.classList.remove("ok"); }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = tsv; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ Скопировано"; btn.classList.add("ok");
    setTimeout(() => { btn.textContent = "⧉ Копировать всё"; btn.classList.remove("ok"); }, 2000);
  });
}

function downloadXlsx() {
  if (!rows.length) return;
  const data = [["Название","Кол-во","Модель"], ...rows.map(r => [r.name, r.qty, r.model])];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws["!cols"] = [{wch:60},{wch:10},{wch:25}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Остатки");
  XLSX.writeFile(wb, "остатки_с_моделями.xlsx");
}
